<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Smart Department Portal</title>
    <script>
      // GitHub Pages SPA 404 fix
      // Stores the full URL in sessionStorage and redirects to /
      var pathSegmentsToKeep = 1; // =1 means keep the repo name segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
